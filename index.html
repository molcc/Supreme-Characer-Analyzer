<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supreme Character Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body, html {
      margin:0; padding:0;
      font-family:'Poppins',sans-serif;
      background: linear-gradient(135deg,#6a11cb,#2575fc);
      color:white;
      overflow-x:hidden;
      text-align:center;
    }

    .container {
      padding:80px 20px;
    }

    h1 {
      font-size:3rem;
      margin-bottom:20px;
      animation: fadeInDown 1s ease forwards;
      opacity:0;
    }

    p {
      font-size:1.2rem;
      margin-bottom:40px;
      animation: fadeIn 1.5s ease forwards;
      opacity:0;
    }

    a.btn {
      display:inline-block;
      margin:10px;
      padding:15px 35px;
      font-size:1.1rem;
      font-weight:600;
      color:#2575fc;
      background:white;
      border-radius:50px;
      transition: transform 0.3s, background 0.3s;
      text-decoration:none;
      animation: fadeInUp 2s ease forwards;
      opacity:0;
    }

    a.btn:hover {
      transform:scale(1.1);
      background:#e0e0e0;
    }

    .btn-coffee {
      background:#ffdd59;
      color:#000;
    }
    .btn-coffee:hover {
      background:#ffd700;
      transform:scale(1.1);
    }

    footer {
      margin-top:80px;
      font-size:0.9rem;
      color:#f0f0f0;
    }

    .float-shape {
      position:absolute;
      border-radius:50%;
      opacity:0.3;
      animation: float 6s ease-in-out infinite;
    }
    .float1 { width:100px; height:100px; background:#ffffff33; top:50px; left:20%; animation-delay:0s; }
    .float2 { width:150px; height:150px; background:#ffffff22; top:200px; left:70%; animation-delay:2s; }
    .float3 { width:80px; height:80px; background:#ffffff44; top:400px; left:40%; animation-delay:4s; }

    @keyframes fadeInDown { to {opacity:1; transform:translateY(0);} from {opacity:0; transform:translateY(-50px);} }
    @keyframes fadeInUp { to {opacity:1; transform:translateY(0);} from {opacity:0; transform:translateY(50px);} }
    @keyframes fadeIn { to {opacity:1;} from {opacity:0;} }
    @keyframes float { 0%,100%{transform:translateY(0px);} 50%{transform:translateY(-30px);} }
  </style>
</head>
<body>

  <!-- Floating Shapes -->
  <div class="float-shape float1"></div>
  <div class="float-shape float2"></div>
  <div class="float-shape float3"></div>

  <div class="container">
    <h1>Supreme Character Analyzer</h1>
    <p>Instantly count your words, analyze text, and improve your writing. Free and easy to use!</p>
    
    <a class="btn" href="analyzer.html">Use the Analyzer</a>
    <a class="btn" href="about.html">About</a>
    <a class="btn" href="privacy.html">Privacy Policy</a>
    
    <!-- Buy Me a Coffee button linking to your local HTML -->
    <a class="btn btn-coffee" href="buy me a coffee.html">☕ Buy Me a Coffee</a>
  </div>

  <footer>&copy; 2026 Molcc. All rights reserved.</footer>

</body>
</html>
